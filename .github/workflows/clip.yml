name: FFmpeg Clip

on:
  workflow_dispatch:
    inputs:
      videoUrl:
        description: 'YouTube Video URL'
        required: true
      startTime:
        description: 'Start time in seconds'
        required: true
      endTime:
        description: 'End time in seconds'
        required: true
      fileName:
        description: 'Output filename'
        required: true

jobs:
  clip:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get install -y ffmpeg
          pip install -U yt-dlp
          curl -fsSL https://deno.land/install.sh | sh
          echo "$HOME/.deno/bin" >> $GITHUB_PATH

      - name: Write cookies file
        run: echo "$YOUTUBE_COOKIES" > cookies.txt
        env:
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}

      - name: Download and Clip Video
        run: |
          START="${{ github.event.inputs.startTime }}"
          END="${{ github.event.inputs.endTime }}"
          URL="${{ github.event.inputs.videoUrl }}"
          FILENAME="${{ github.event.inputs.fileName }}"
          export PATH="$HOME/.deno/bin:$PATH"
          yt-dlp \
            --cookies cookies.txt \
            --extractor-args "youtube:player_client=web" \
            --js-runtimes deno \
            --remote-components ejs:github \
            -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" \
            --merge-output-format mp4 \
            -o "input.mp4" \
            "$URL"
          ffmpeg -i input.mp4 \
            -ss "$START" \
            -to "$END" \
            -vf "scale=1080:1920:force_original_aspect_ratio=decrease,pad=1080:1920:(ow-iw)/2:(oh-ih)/2" \
            -c:v libx264 -c:a aac -preset fast \
            "${FILENAME}.mp4"

      - name: Upload to Google Drive
        env:
          GDRIVE_CREDS: ${{ secrets.DRIVEKI }}
          FOLDER_ID: ${{ secrets.DRIVEFOLDER2 }}
          FILENAME: ${{ github.event.inputs.fileName }}
        run: |
          curl https://rclone.org/install.sh | sudo bash
          echo "$GDRIVE_CREDS" > /tmp/creds.json
          rclone copy "${FILENAME}.mp4" :drive: \
            --drive-service-account-file /tmp/creds.json \
            --drive-root-folder-id "$FOLDER_ID" \
            -v
