name: FFmpeg Clip

on:
  workflow_dispatch:
    inputs:
      videoUrl:
        description: 'YouTube Video URL'
        required: true
      startTime:
        description: 'Start time in seconds'
        required: true
      endTime:
        description: 'End time in seconds'
        required: true
      fileName:
        description: 'Output filename'
        required: true

jobs:
  clip:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get install -y ffmpeg
          pip install -U yt-dlp

      - name: Write cookies file
        run: echo "$YOUTUBE_COOKIES" > cookies.txt
        env:
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}

      - name: Download and Clip Video
        run: |
          START="${{ github.event.inputs.startTime }}"
          END="${{ github.event.inputs.endTime }}"
          URL="${{ github.event.inputs.videoUrl }}"
          FILENAME="${{ github.event.inputs.fileName }}"

          yt-dlp \
            --cookies cookies.txt \
            --extractor-args "youtube:player_client=web;player_skip=webpage,configs" \
            --add-header "User-Agent:Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
            --sleep-interval 3 \
            --max-sleep-interval 6 \
            -f "bestvideo[height<=720][ext=mp4]+bestaudio[ext=m4a]/best[height<=720][ext=mp4]/best" \
            --merge-output-format mp4 \
            -o "input.mp4" \
            "$URL"

          ffmpeg -i input.mp4 \
            -ss "$START" \
            -to "$END" \
            -vf "scale=1080:1920:force_original_aspect_ratio=decrease,pad=1080:1920:(ow-iw)/2:(oh-ih)/2" \
            -c:v libx264 -c:a aac -preset fast \
            "${FILENAME}.mp4"

      - name: Upload to Google Drive
        uses: adityak74/google-drive-upload-git-action@main
        with:
          credentials: ${{ secrets.DRIVEKI }}
          filename: "${{ github.event.inputs.fileName }}.mp4"
          folderId: ${{ secrets.DRIVEFOLDER2 }}
          overwrite: "true"
