name: FFmpeg Clip

on:
  workflow_dispatch:
    inputs:
      videoUrl:
        description: 'YouTube Video URL'
        required: true
      startTime:
        description: 'Start time in seconds'
        required: true
      endTime:
        description: 'End time in seconds'
        required: true
      fileName:
        description: 'Output filename'
        required: true

jobs:
  clip:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get install -y ffmpeg bc
          pip install yt-dlp

      - name: Download and Clip Video
        run: |
          yt-dlp -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]" \
            --download-sections "*${{ github.event.inputs.startTime }}-${{ github.event.inputs.endTime }}" \
            -o "input.mp4" \
            "${{ github.event.inputs.videoUrl }}"
          ffmpeg -i input.mp4 \
            -vf "scale=1080:1920:force_original_aspect_ratio=decrease,pad=1080:1920:(ow-iw)/2:(oh-ih)/2" \
            -c:v libx264 -c:a aac -preset fast \
            "${{ github.event.inputs.fileName }}.mp4"

      - name: Upload to Google Drive
        uses: adityak74/google-drive-upload-git-action@main
        with:
          credentials: ${{ secrets.GOOGLE_DRIVE_CREDENTIALS }}
          filename: "${{ github.event.inputs.fileName }}.mp4"
          folderId: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          overwrite: "true"
